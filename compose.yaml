services:
  review-manager:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      OCR_LLM_URL: ${OCR_LLM_URL:-}
      OCR_LLM_TOKEN: ${OCR_LLM_TOKEN:-}
      OCR_LLM_MODEL: ${OCR_LLM_MODEL:-}
      OCR_USE_ANTHROPIC: ${OCR_USE_ANTHROPIC:-}
    volumes:
      - rm-data:/data
    restart: unless-stopped

volumes:
  rm-data:
